name: "pre-release"

# run on any changes, will copy data to pre-releases
on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  pre-release:
    # disable this job, since push doesn't have tag, reports main branch name
    if: false

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        
    steps:
      - name: Update CMake
        uses: lukka/get-cmake@latest

      - name: Check out code
        uses: actions/checkout@v6

      - name: Build and install to bin/
        run: ./scripts/cibuild.sh ${{ matrix.os }}
        shell: bash

      # so do another upload to get both
      - name: Upload all builds to releases
        uses: svenstaro/upload-release-action@v2
        with:
          prerelease: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bin/*.zip
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
